ecl_version: "1.0"
feature: "apple-speech-backend"
status: completed
created: "2026-04-24"
updated: "2026-04-24"

prompt_calibration:
  raw_input: |
    Apple 自己的语音转文字是什么模型？能不能也结合到这个里面来？
    请实现，然后把这个模型设置成默认的模型。
  intent_decomposition:
    total_intents: 2
    total_tracks: 1
    tracks:
      - track_id: T1
        name: "Apple Speech backend integration + set as default"
        priority: 1
        intents:
          - raw: "集成 Apple SFSpeechRecognizer 作为新的 ASR 后端"
            type: feature
          - raw: "将 apple 设为默认模型"
            type: configuration
  tracks:
    T1:
      calibrated_scenario: |
        在 live-subtitle.py 中新增 AppleSpeechTranscriber 后端，使用 macOS 内置
        SFSpeechAudioBufferRecognitionRequest 实现真流式识别。通过 --model apple
        调用，并设为全局默认模型，替换原来的 zipformer。

requirements:
  - id: REQ-001
    text: "AppleSpeechTranscriber 实现真流式 ASR"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "使用 SFSpeechAudioBufferRecognitionRequest 实时推送音频帧"
      - "返回 partial results (is_final=False) 和 final results (is_final=True)"
      - "识别超时 (~60s 静默) 后自动重启 session"
      - "支持 device 参数（与其他后端一致）"
      - "支持 denoise 参数"

  - id: REQ-002
    text: "Apple Speech 设为默认模型"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "argparse --model 默认值改为 'apple'"
      - "start.sh MODEL 默认值改为 'apple'"
      - "start.sh model 验证列表包含 'apple'"
      - "MODELS 字典中 apple 排在第一位"

  - id: REQ-003
    text: "语言映射支持"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "默认 locale: zh-CN"
      - "--language zh → zh-CN, en → en-US 等映射"
      - "直接传入 locale ID 也可以 (如 ja-JP)"

decisions:
  - id: DEC-001
    date: "2026-04-24"
    decision: "使用 SFSpeechAudioBufferRecognitionRequest (真流式) 而非 SFSpeechURLRecognitionRequest (chunked)"
    context: "Buffer request 支持实时推送音频帧，延迟更低，与 Sherpa 后端同级"
  - id: DEC-002
    date: "2026-04-24"
    decision: "默认 locale 设为 zh-CN（中文）"
    context: "项目主要面向中文会议场景，用户可通过 --language 覆盖"
  - id: DEC-003
    date: "2026-04-24"
    decision: "使用 ctypes.memmove 批量拷贝音频到 AVAudioPCMBuffer"
    context: "per-sample Python 循环太慢，ctypes 批量拷贝零开销"

probes:
  - id: PROBE-001
    target: REQ-001
    type: spike
    question: "SFSpeechAudioBufferRecognitionRequest 能否从 Python/PyObjC 调用？"
    verdict: feasible
    evidence: "端到端测试通过：5s 实时麦克风录音，partial results 持续返回"
  - id: PROBE-002
    target: REQ-001
    type: assumption
    question: "是否需要 NSRunLoop 才能收到回调？"
    verdict: "需要，但 live-subtitle.py 已在 NSApplication.run() 中运行主 RunLoop"
  - id: PROBE-003
    target: REQ-003
    type: assumption
    question: "zh-CN on-device 识别是否可用？"
    verdict: "当前设备: en-US 支持 on-device，zh-CN 需要网络（可在系统设置中下载离线模型）"

implementation:
  files_modified:
    - "scripts/live-subtitle.py — 新增 AppleSpeechTranscriber 类，修改默认值和工厂函数"
    - "scripts/start.sh — 默认模型改为 apple，验证列表更新"
    - "CLAUDE.md — ASR 后端表格更新，已知限制更新"
    - "tutorial.md — 默认模型描述更新，FAQ 更新"
  dependencies_added:
    - "pyobjc-framework-Speech"
    - "pyobjc-framework-AVFoundation"

known_limitations:
  - "Apple Speech 有 ~60s 静默超时限制，超时后自动重启（用户无感知）"
  - "zh-CN on-device 识别需要在系统设置中手动下载语言模型"
  - "识别质量依赖 Apple 服务器（非 on-device 时需联网）"
  - "不支持自定义词表或 prompt 引导"

feature_guard:
  generated: "2026-04-24"
  guards:
    - id: GUARD-001
      feature: "Apple Speech ASR backend"
      description: "macOS 内置 SFSpeechRecognizer 真流式 ASR 后端"
      key_files:
        - "scripts/live-subtitle.py"
      invariants:
        - "AppleSpeechTranscriber 类存在且继承 BaseTranscriber"
        - "--model apple 通过 create_transcriber 工厂函数可正常创建实例"
        - "apple 是 MODELS 字典和 argparse 的默认值"
        - "真流式：使用 SFSpeechAudioBufferRecognitionRequest 而非 URL request"
        - "自动重启：识别超时或结束后重新创建 recognition session"
      verification:
        command: "python3 -c \"import ast; ast.parse(open('scripts/live-subtitle.py').read())\""
        expected: "no error"
      status: active

pending_input: null
