ecl_version: "1.0"
feature: "model-switcher"
status: completed
created: "2026-04-10"
updated: "2026-04-10"

prompt_calibration:
  raw_input: "我需要你能很方便的切换模型，就只要在启动的时候加上 --model 参数就好了"
  intent_decomposition:
    total_intents: 1
    total_tracks: 1
    tracks:
      - track_id: T1
        name: "Multi-model switcher via --model flag"
        priority: 1
        intents:
          - raw: "启动时加 --model 参数切换模型"
            type: feature
  tracks:
    T1:
      calibrated_scenario: |
        在 start.sh 和 live-subtitle.py 中加入 --model 参数，
        支持三种已验证的 ASR 后端：zipformer (sherpa-onnx transducer),
        paraformer (sherpa-onnx paraformer), qwen3-asr (torch/transformers)。
        默认使用 zipformer。

requirements:
  - id: REQ-001
    text: "--model 参数统一切换三种 ASR 后端"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "--model zipformer 使用 sherpa-onnx from_transducer (默认)"
      - "--model paraformer 使用 sherpa-onnx from_paraformer"
      - "--model qwen3-asr 使用 Qwen3ASRModel"
      - "无效 --model 值报错并列出可用选项"
    decomposition:
      features: [FEAT-001, FEAT-002, FEAT-003]

  - id: REQ-002
    text: "默认模型为 zipformer"
    status: verified
    confidence: 1.0

  - id: REQ-003
    text: "sherpa-onnx 后端使用真正流式识别，qwen3-asr 使用 chunked 转录"
    status: verified
    confidence: 1.0

features:
  - id: FEAT-001
    name: "StreamingTranscriber 工厂模式重构"
    parent: REQ-001
    description: |
      将 StreamingTranscriber 拆为：
      - SherpaTransducerTranscriber (zipformer)
      - SherpaParaformerTranscriber (paraformer)
      - QwenASRTranscriber (qwen3-asr)
      - create_transcriber(model, callback) 工厂函数
    complexity: medium
    files:
      - scripts/live-subtitle.py

  - id: FEAT-002
    name: "start.sh 透传 --model 参数"
    parent: REQ-001
    description: "start.sh 接受 --model 参数并传给 live-subtitle.py"
    complexity: small
    files:
      - scripts/start.sh

  - id: FEAT-003
    name: "health-check.sh 适配多模型"
    parent: REQ-001
    description: "检查当前可用的模型后端和依赖"
    complexity: small
    files:
      - scripts/health-check.sh

decisions:
  - id: DEC-001
    date: "2026-04-10"
    decision: "三种后端共享 callback(text, is_final) 接口"
    rationale: "SubtitleDelegate 不需要知道具体后端，只关心文本输出"

  - id: DEC-002
    date: "2026-04-10"
    decision: "默认 zipformer，因为用户明确要求切回原模型"

  - id: DEC-003
    date: "2026-04-10"
    decision: "sherpa-onnx 模型存放在 ~/.meeting-helper/models/ 下"
    rationale: "已有模型文件在此位置"

dependency_graph:
  FEAT-001: []
  FEAT-002: [FEAT-001]
  FEAT-003: [FEAT-001]

model_registry:
  zipformer:
    backend: sherpa-onnx
    api: from_transducer
    model_dir: "~/.meeting-helper/models/sherpa-onnx-streaming-zipformer-bilingual-zh-en-2023-02-20"
    files: [encoder-epoch-99-avg-1.onnx, decoder-epoch-99-avg-1.onnx, joiner-epoch-99-avg-1.onnx, tokens.txt]
    streaming: true
    dependencies: [sherpa_onnx, sounddevice, numpy]

  paraformer:
    backend: sherpa-onnx
    api: from_paraformer
    model_dir: "~/.meeting-helper/models/sherpa-onnx-streaming-paraformer-bilingual-zh-en"
    files: [encoder.int8.onnx, decoder.int8.onnx, tokens.txt]
    streaming: true
    dependencies: [sherpa_onnx, sounddevice, numpy]

  qwen3-asr:
    backend: torch/transformers
    api: Qwen3ASRModel.from_pretrained
    model_name: "Qwen/Qwen3-ASR-0.6B"
    streaming: false  # chunked transcription
    dependencies: [torch, qwen_asr, sounddevice, numpy]
