iteration_4:
  trigger: "User requested: real-time transcript overlay + window-specific recording"
  decisions:
    - id: DEC-010
      date: 2026-04-10
      decision: "PyObjC floating overlay for real-time subtitle display"
      context: "Single-file Python script using AppKit — native transparency, click-through, always-on-top. Polls Screenpipe REST API every 5s."
    - id: DEC-011
      date: 2026-04-10
      decision: "Screenpipe --transcription-mode realtime for low-latency transcription"
      context: "Reduces latency from ~30s (batch) to ~5-10s. Independent of meeting detection (smart mode)."
    - id: DEC-012
      date: 2026-04-10
      decision: "Screenpipe --included-windows for window-level screen capture filtering"
      context: "Contains matching on window titles. Default: Zoom + Microsoft Teams. Audio unaffected."
    - id: DEC-013
      date: 2026-04-10
      decision: "start.sh as single canonical start script; start-screenpipe*.sh deprecated"
      context: "Three inconsistent start scripts existed. Consolidated to one with configurable variables."
  new_requirements:
    - id: REQ-012
      text: "Floating subtitle overlay window showing real-time transcript"
      status: implemented
      confidence: 0.9
      acceptance_criteria:
        - "Semi-transparent always-on-top window at bottom of screen"
        - "Click-through (mouse events pass to underlying app)"
        - "Shows speaker + timestamp + transcript text"
        - "Text appears within ~10s of speech (requires realtime transcription mode)"
        - "Cmd+Shift+S toggles visibility"
        - "Ctrl+C exits cleanly"
        - "Connection status indicator when Screenpipe is unreachable"
      dependencies: [REQ-013]
      implementation: "scripts/live-subtitle.py"
    - id: REQ-013
      text: "Low-latency realtime transcription mode"
      status: implemented
      confidence: 0.85
      acceptance_criteria:
        - "Screenpipe starts with --transcription-mode realtime"
        - "Transcripts appear in API within ~10s of speech"
        - "Meeting detection (list-meetings) still works"
      risks:
        - "Realtime mode vs smart transcription mode compatibility — needs runtime verification"
      implementation: "scripts/start.sh (CMD array with --transcription-mode)"
    - id: REQ-014
      text: "Window-specific screen recording (only Zoom/Teams)"
      status: implemented
      confidence: 0.95
      acceptance_criteria:
        - "Screenpipe starts with --included-windows for configured apps"
        - "Only matching windows appear in OCR search results"
        - "Audio recording is unaffected (still captures all mic + system audio)"
        - "Window list is configurable via INCLUDED_WINDOWS variable in start.sh"
      implementation: "scripts/start.sh (INCLUDED_WINDOWS array)"
  new_features:
