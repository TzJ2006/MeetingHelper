prompt_calibration:
  calibrated_scenario: |
    Build a meeting assistant on top of Screenpipe infrastructure. Screenpipe runs
    in background capturing audio (mic + system), screen, and generating transcripts.
    User interacts via Claude Code CLI connected to Screenpipe MCP server for
    real-time Q&A and on-demand summaries. Customize existing Screenpipe meeting-summary
    pipe for comprehensive Chinese-English meeting summaries. Target: macOS + Windows.

requirements:
  - id: REQ-001
    text: "Capture meeting audio from microphone and system audio"
    status: verified
    confidence: 0.95
    resolution: "Screenpipe native — no custom code needed"
    acceptance_criteria:
      - "Screenpipe captures both mic and system audio simultaneously"
      - "Works with Zoom, Teams, Meet on macOS and Windows"
      - "Meeting auto-detected via UI element scanning"
    risks:
      - "macOS requires Screen Recording + Accessibility permissions"
      - "All remote participants mixed into single system audio channel"

  - id: REQ-002
    text: "Generate transcripts during meetings"
    status: verified
    confidence: 0.75
    resolution: "Screenpipe Whisper — per-chunk language detection for Chinese/English"
    acceptance_criteria:
      - "Transcripts available in Screenpipe DB after each audio chunk"
      - "Chinese-only and English-only chunks transcribed accurately"
      - "Mixed-language chunks detected per-chunk (not intra-sentence)"
    risks:
      - "CRITICAL: Mid-sentence code-switching (e.g. 'Let's discuss the 技术方案') will degrade — Whisper detects language per 30s chunk, not per sentence"
      - "Workaround: configure languages=[chinese, english] for per-chunk auto-detect"
      - "Alternative: test qwen3-asr engine which may handle multilingual better"

  - id: REQ-003
    text: "Produce comprehensive meeting summaries"
    status: verified
    confidence: 0.85
    resolution: "Customize existing Screenpipe meeting-summary pipe"
    acceptance_criteria:
      - "Summary includes: discussion points, decisions, action items, unresolved issues"
      - "Speaker attribution where available"
      - "Triggered manually or at meeting end"
      - "Handles meetings up to 4 hours via chunked summarization"
    risks:
      - "Long meetings (>1hr) may exceed context window — need chunking strategy"
      - "Pipe executes via Pi agent (subprocess), not direct API — adds ~2-5s latency"

  - id: REQ-004
    text: "Interactive Q&A about meeting content via Claude Code CLI"
    status: verified
    confidence: 0.9
    resolution: "Claude Code CLI + screenpipe-mcp (27 MCP tools available)"
    acceptance_criteria:
      - "User can query meeting transcripts via search-content MCP tool"
      - "Can filter by speaker, time range, content type"
      - "get-meeting returns full transcript with speaker mapping"
      - "Answers reference specific transcript segments"
    risks:
      - "Full transcript retrieval for long meetings needs pagination"
      - "Activity-summary samples only top 15 transcriptions"

  - id: REQ-005
    text: "Cross-platform: macOS (primary) + Windows"
    status: verified
    confidence: 0.95
    resolution: "Screenpipe + Claude Code CLI both support macOS and Windows"

  - id: REQ-006
    text: "Use Claude Code CLI as AI interaction backend"
    status: verified
    confidence: 0.95
    resolution: "Claude Code CLI with MCP connection to Screenpipe"

  - id: REQ-007
    text: "Capture screens for visual meeting context"
    status: verified
    confidence: 0.90
    resolution: "Screenpipe event-driven screen capture + OCR + accessibility tree"
    acceptance_criteria:
      - "Screenshots captured during screen sharing / app switches"
      - "OCR text searchable via MCP search-content(content_type=ocr)"
      - "Frames include app_name, window_name, timestamp"

  - id: REQ-008
    text: "Privacy and consent documentation"
    status: verified
    confidence: 0.9
    source: adversarial-review
    resolution: "Document consent requirements, use Screenpipe pipe permissions"
    acceptance_criteria:
      - "README includes recording consent guidance"
      - "Pipe permissions restrict data access to meeting apps only"
      - "Note about Claude API data transmission for sensitive meetings"

