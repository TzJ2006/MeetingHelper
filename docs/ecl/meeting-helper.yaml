  wave_2: [FEAT-002, FEAT-003]
  wave_3: [FEAT-004]

data_flows:
  meeting_capture:
    input: "Mic + system audio + screen (Screenpipe)"
    transform: "VAD → Whisper transcription → OCR → FTS5 index"
    store: "~/.screenpipe/db/ (SQLite)"
    output: "REST API localhost:3030 + MCP server"
  meeting_summary:
    input: "Screenpipe /meetings + /search API"
    transform: "Pi agent executes pipe.md → queries data → sends to Claude → structured summary"
    store: "Pipe execution output (console/file)"
    output: "Markdown summary"
  meeting_qa:
    input: "User question in Claude Code CLI"
    transform: "Claude calls MCP tools (search-content, get-meeting) → reasons over results"
    store: "Claude Code conversation"
    output: "Answer with transcript references and timestamps"

adversarial_findings:
  critical:
    - id: FIND-001
      target: REQ-002
      issue: "Chinese-English code-switching: Whisper does per-chunk single-language detection"
      resolution: "Document limitation. Configure languages=[zh,en] for auto-detect. Test qwen3-asr as alternative."
      status: accepted-with-mitigation
  high:
    - id: FIND-002
      target: FEAT-002
      issue: "Pipe execution is agent-mediated via Pi CLI, not direct API calls"
      resolution: "Correctly documented in architecture. Customize existing pipe."
      status: resolved
    - id: FIND-003
      target: [REQ-003, REQ-004]
      issue: "Long meetings (3+ hours) may exceed context window"
      resolution: "Chunked summarization in pipe. Time-bounded MCP queries in Q&A."
      status: resolved
    - id: FIND-004
      target: FEAT-001
      issue: "Meeting detection may require smart transcription mode + accessibility permissions"
      resolution: "Document in setup guide. Add permission verification to health check."
      status: resolved
    - id: FIND-005
      target: FEAT-005
      issue: "Setup complexity underestimated (7+ configuration steps)"
      resolution: "Upgraded to medium complexity. Added health check script."
      status: resolved
    - id: FIND-006
      target: all
      issue: "Privacy: Screenpipe records everything, corporate data concerns"
      resolution: "Added REQ-008. Pipe permissions restrict to meeting apps. Document consent."
      status: resolved
  medium:
    - id: FIND-007
      target: REQ-003
      issue: "Speaker identification limited — remote participants mixed in system audio"
      resolution: "Document limitation. Manual naming workflow. Calendar-assisted diarization available."
      status: accepted
    - id: FIND-008
      target: FEAT-002
      issue: "Built-in meeting-summary pipe already exists"
      resolution: "DEC-005: Customize existing pipe instead of building from scratch."
      status: resolved
    - id: FIND-009
      target: all
      issue: "No graceful degradation when components are down"
      resolution: "Health check script. CLAUDE.md includes troubleshooting guidance."
      status: resolved

