      dependencies: []
      complexity: small
  new_modules:
    - id: MOD-006
      name: "Subtitle overlay application"
      parent: FEAT-006
      files: ["scripts/live-subtitle.py"]
    - id: MOD-007
      name: "Realtime transcription config"
      parent: FEAT-007
      files: ["scripts/start.sh"]
    - id: MOD-008
      name: "Window filtering config"
      parent: FEAT-008
      files: ["scripts/start.sh"]
  adversarial_findings:
