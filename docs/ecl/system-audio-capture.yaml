ecl_version: "1.0"
feature: "system-audio-capture"
status: completed
created: "2026-04-13"
updated: "2026-04-13"

prompt_calibration:
  raw_input: |
    我想要录进去 meeting system 的声音，然后得到要用 transcript,
    其他的东西，basically 就是让这里的声音后面和麦克风一样的操作。
  intent_decomposition:
    total_intents: 1
    total_tracks: 1
    tracks:
      - track_id: T1
        name: "System audio capture and transcription"
        priority: 1
        intents:
          - raw: "录进去 meeting system 的声音，得到 transcript，和麦克风一样的操作"
            type: feature
  tracks:
    T1:
      calibrated_scenario: |
        在 live-subtitle.py 中支持同时捕获麦克风和系统音频（通过 BlackHole 虚拟设备），
        各自独立转录，字幕窗口分区显示 [MIC]/[SYS]，分别写入两个转录文件。
        通过 --source both 启动双路模式。
      intent_dimensions:
        task: { status: present, value: "Capture system audio and transcribe it" }
        input: { status: present, value: "System audio via BlackHole 2ch" }
        output: { status: resolved, value: "Split subtitle display + dual transcript files" }
        constraints: { status: enriched, value: "BlackHole 2ch installed; Multi-Output configured" }
        context: { status: enriched, value: "6 ASR backends, all use sd.InputStream; Moonshine has native device support" }
        audience: { status: present, value: "Same user" }
        memory: { status: present, value: "Existing mic-only pipeline" }
        success_criteria: { status: resolved, value: "Both sources transcribed independently with <3s latency each" }
        examples: { status: resolved, value: "bash scripts/start.sh --source both" }

decisions:
  - id: DEC-001
    date: "2026-04-13"
    decision: "Simultaneous dual-channel capture (mic + system audio)"
    context: "User chose dual over alternative/mixed. Two independent ASR instances."
  - id: DEC-002
    date: "2026-04-13"
    decision: "Approach A: add device parameter to existing backends"
    context: "Minimal code change, reuse existing transcriber classes. Rejected: separate capture layer (too much refactor), dual process (bad UX), ScreenCaptureKit (too complex)."
  - id: DEC-003
    date: "2026-04-13"
    decision: "Split subtitle display — two independent regions, not interleaved text"
    context: "Adversarial review found single _current_line_start cursor incompatible with dual partial lines. Must use two-region display."

requirements:
  - id: REQ-001
    text: "All ASR backends accept device parameter for audio input selection"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "BaseTranscriber.__init__() accepts device=None parameter"
      - "All sd.InputStream() calls pass device=self.device"
      - "MoonshineTranscriber forwards device to MicTranscriber(device=device)"
      - "device=None falls back to system default (current behavior)"
    risks:
      - "48kHz→16kHz resampling handled by CoreAudio HAL (low risk)"

  - id: REQ-002
    text: "--source CLI parameter: mic (default), system, both"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "argparse --source choice with default 'mic'"
      - "--source mic: current behavior unchanged"
      - "--source system: capture from system audio device only"
      - "--source both: capture mic + system simultaneously"
    risks: []

  - id: REQ-003
    text: "Auto-detect system audio device with --system-device override"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "Auto-detect: search device names for 'BlackHole' (case-insensitive)"
      - "--system-device 'name' overrides auto-detection"
      - "Clear error message if --source system/both and no virtual device found"
      - "List available devices in error message for user guidance"
    risks:
      - "Alternative virtual devices (Loopback, SoundFlower, VB-Cable) need --system-device override"

  - id: REQ-004
    text: "Split subtitle display for dual-source mode"
    status: verified
    confidence: 0.85
    acceptance_criteria:
      - "Two independent text regions in subtitle window (top=MIC, bottom=SYS)"
      - "Each region has its own _current_line_start cursor"
      - "Each region updates independently without interfering"
      - "Source labels [MIC]/[SYS] shown in each region"
      - "Single-source mode uses full window (no split)"
    risks:
      - "Window height may need to increase for dual mode (2x content)"
    source: adversarial-review-finding-1

  - id: REQ-005
    text: "Dual transcriber orchestration in SubtitleDelegate"
    status: verified
    confidence: 0.90
    acceptance_criteria:
      - "SubtitleDelegate creates 1 or 2 transcriber instances based on --source"
      - "Each transcriber's callback routes to correct display region"
      - "Both transcribers start/stop together"
      - "Model loads sequentially (not parallel) to avoid memory spike"
    risks:
      - "Heavy models (whisper ~1.6GB, voxtral ~3GB) double memory in dual mode"

  - id: REQ-006
    text: "Separate transcript files per source"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "Mic: ~/.meeting-helper/transcripts/YYYY-MM-DD.txt (unchanged)"
      - "System: ~/.meeting-helper/transcripts/YYYY-MM-DD-sys.txt"
      - "Each has its own file handle and date-rollover tracking"
      - "Single-source mode writes to appropriate file only"
    risks: []

  - id: REQ-007
    text: "start.sh and stop.sh support new parameters"
    status: verified
    confidence: 0.95
    acceptance_criteria:
      - "start.sh accepts --source and --system-device, passes to live-subtitle.py"
      - "start.sh case parser updated with new flags"
      - "stop.sh unchanged (already handles single PID)"
    risks: []

  - id: REQ-008
    text: "Startup validation and resource warning"
    status: verified
    confidence: 0.85
    acceptance_criteria:
      - "When --source both with heavy model (whisper/voxtral/qwen3-asr): print memory warning"
      - "Verify selected system device exists and has input channels"
      - "Verify device can open at 16kHz (or note CoreAudio will resample)"
    source: adversarial-review-finding-4

features:
  - id: FEAT-001
    name: "Device parameter on all ASR backends"
    parent: [REQ-001]
    modules: [MOD-001]
    dependencies: []
    complexity: small
    description: "Add device parameter to BaseTranscriber and propagate to all 6 subclasses"

  - id: FEAT-002
    name: "Split subtitle display"
    parent: [REQ-004]
    modules: [MOD-002]
    dependencies: []
    complexity: medium
    description: "Redesign subtitle window for dual-region display (MIC top, SYS bottom)"

  - id: FEAT-003
    name: "Dual transcriber orchestration"
    parent: [REQ-005, REQ-002]
    modules: [MOD-003]
    dependencies: [FEAT-001, FEAT-002]
    complexity: medium
    description: "SubtitleDelegate manages 1 or 2 transcribers with source-routed callbacks"

  - id: FEAT-004
    name: "Dual file output"
    parent: [REQ-006]
    modules: [MOD-004]
    dependencies: [FEAT-003]
    complexity: small
    description: "Separate file handles and write paths for mic/system transcripts"

  - id: FEAT-005
    name: "System device detection"
    parent: [REQ-003, REQ-008]
    modules: [MOD-005]
    dependencies: []
    complexity: small
    description: "Auto-detect BlackHole, validate device, handle errors"

  - id: FEAT-006
    name: "CLI parameter support"
    parent: [REQ-002, REQ-007]
    modules: [MOD-006]
    dependencies: [FEAT-005]
    complexity: small
    description: "argparse + start.sh support for --source and --system-device"

modules:
  - id: MOD-001
    name: "BaseTranscriber device parameter"
    parent: FEAT-001
    files: ["scripts/live-subtitle.py"]
    functions:
      - "BaseTranscriber.__init__(device=None)"
      - "SherpaTranscriber: sd.InputStream(device=self.device)"
      - "QwenASRTranscriber: sd.InputStream(device=self.device)"
      - "WhisperTranscriber: sd.InputStream(device=self.device)"
      - "VoxtralTranscriber: sd.InputStream(device=self.device)"
      - "MoonshineTranscriber: _MoonMic(device=self.device)"

  - id: MOD-002
    name: "Split display regions"
    parent: FEAT-002
    files: ["scripts/live-subtitle.py"]
    functions:
      - "_setupWindow: create two NSTextView regions when dual mode"
      - "_setupSingleDisplay / _setupDualDisplay"
      - "Each region: own _current_line_start, own update/finalize methods"
      - "Source label rendering [MIC]/[SYS]"

  - id: MOD-003
    name: "Dual transcriber management"
    parent: FEAT-003
    files: ["scripts/live-subtitle.py"]
    functions:
      - "_loadModelAndStart: create 1 or 2 transcribers"
      - "Mic callback → handleMicTranscription"
      - "System callback → handleSysTranscription"
      - "Sequential model loading"
      - "Coordinated stop/cleanup"

  - id: MOD-004
    name: "Dual file output"
    parent: FEAT-004
    files: ["scripts/live-subtitle.py"]
    functions:
      - "_mic_output_file / _sys_output_file separate handles"
      - "_writeToFile(text, source='mic'|'sys')"
      - "Independent date rollover per file"

  - id: MOD-005
    name: "Device detection"
    parent: FEAT-005
    files: ["scripts/live-subtitle.py"]
    functions:
      - "detect_system_audio_device() → device_id or None"
      - "Search for 'blackhole' case-insensitive in device names"
      - "validate_device(device_id) → bool"
      - "Startup warnings for heavy models in dual mode"

  - id: MOD-006
    name: "CLI parameters"
    parent: FEAT-006
    files: ["scripts/live-subtitle.py", "scripts/start.sh"]
    functions:
      - "argparse: --source {mic,system,both}, --system-device"
      - "start.sh: case parser + passthrough to python"

dependency_graph:
  FEAT-001: []
  FEAT-002: []
  FEAT-005: []
  FEAT-003: [FEAT-001, FEAT-002]
  FEAT-006: [FEAT-005]
  FEAT-004: [FEAT-003]

implementation_waves:
  wave_1: [FEAT-001, FEAT-002, FEAT-005]  # parallel, no deps
  wave_2: [FEAT-003, FEAT-006]             # depend on wave 1
  wave_3: [FEAT-004]                        # depends on wave 2

data_flows:
  mic_capture:
    input: "MacBook Pro Microphone (default input device)"
    transform: "sd.InputStream → ASR backend → callback(text, is_final)"
    store: "~/.meeting-helper/transcripts/YYYY-MM-DD.txt"
    output: "Subtitle window MIC region"
  system_capture:
    input: "BlackHole 2ch (system audio via Multi-Output Device)"
    transform: "sd.InputStream(device=blackhole_id) → ASR backend → callback(text, is_final)"
    store: "~/.meeting-helper/transcripts/YYYY-MM-DD-sys.txt"
    output: "Subtitle window SYS region"

adversarial_findings:
  critical:
    - id: FIND-001
      target: [REQ-004, REQ-005]
      issue: "Single _current_line_start cursor cannot track two partial lines; display garbled"
      resolution: "Added REQ-004 for split display with independent regions"
      status: resolved
  high:
    - id: FIND-002
      target: [REQ-001]
      issue: "Moonshine device parameter goes to _MoonMic, not sd.InputStream"
      resolution: "MicTranscriber natively supports device=int. Forward in MoonshineTranscriber."
      status: resolved
    - id: FIND-003
      target: [REQ-003, REQ-001]
      issue: "BlackHole silence profile differs from mic; VAD threshold may malfunction"
      resolution: "Accepted as known limitation. System audio has different dynamics. Document it."
      status: accepted
    - id: FIND-004
      target: [REQ-005]
      issue: "Dual model instances double memory and compete for compute"
      resolution: "Added REQ-008 for startup warning. Recommend zipformer/paraformer for dual mode."
      status: accepted-with-mitigation
  medium:
    - id: FIND-005
      target: [REQ-006]
      issue: "File I/O needs two separate handle pairs; os._exit bypasses cleanup"
      resolution: "REQ-006 specifies separate handles. Accept os._exit risk (flush after each write)."
      status: resolved
    - id: FIND-006
      target: [REQ-003, REQ-002]
      issue: "No fallback when BlackHole missing; cryptic PortAudio error"
      resolution: "REQ-003 specifies clear error message with device list."
      status: resolved
    - id: FIND-007
      target: [REQ-005, REQ-004]
      issue: "Prefix tags alone don't solve interleaving; UI model incompatible"
      resolution: "Subsumed by FIND-001 fix (split display)."
      status: resolved
  low:
    - id: FIND-008
      target: [REQ-007]
      issue: "start.sh strict parser rejects unknown flags"
      resolution: "REQ-007 specifies updating both start.sh and argparse."
      status: resolved
    - id: FIND-009
      target: [REQ-001, REQ-003]
      issue: "48kHz→16kHz resampling depends on CoreAudio HAL"
      resolution: "Accepted as low risk. CoreAudio handles well in practice."
      status: accepted

probes:
  - id: PROBE-001
    target: REQ-001
    type: assumption
    question: "Can BlackHole be opened as sd.InputStream input at 16kHz?"
    verdict: feasible
    evidence: "sd.InputStream(device=1, samplerate=16000) succeeds. CoreAudio resamples from native 48kHz."
  - id: PROBE-002
    target: REQ-001
    type: assumption
    question: "Does Moonshine MicTranscriber accept device parameter?"
    verdict: feasible
    evidence: "MicTranscriber.__init__ has device: int = None parameter natively."
  - id: PROBE-003
    target: REQ-003
    type: assumption
    question: "Is BlackHole installed and Multi-Output configured?"
    verdict: feasible
    evidence: "User confirmed Multi-Output Device already configured. BlackHole 2ch at device index 1."

confrontation:
  red_team:
    - id: ATK-001
      scenario: "Both partial updates fire in quick succession, garbling display"
      severity: critical
    - id: ATK-002
      scenario: "Heavy model (voxtral 3GB) × 2 = 6GB, OOM on 8GB Mac"
      severity: high
    - id: ATK-003
      scenario: "BlackHole not installed, --source both gives cryptic PortAudio error"
      severity: medium
    - id: ATK-004
      scenario: "System audio VAD threshold too low, background music never finalizes"
      severity: medium
  blue_team:
    - attack: ATK-001
      verdict: mitigated
      mitigation: "Split display with independent regions (REQ-004). Each source has own cursor."
    - attack: ATK-002
      verdict: mitigated
      mitigation: "Startup warning for heavy models in dual mode (REQ-008). Recommend lightweight models."
    - attack: ATK-003
      verdict: mitigated
      mitigation: "Auto-detect with clear error and device list (REQ-003)."
    - attack: ATK-004
      verdict: accepted
      mitigation: "Document as known limitation. VAD threshold tuned for voice, not music/effects."

known_limitations:
  - "System audio VAD threshold (0.008) tuned for mic, may behave differently with system audio"
  - "Dual mode doubles ASR memory usage — recommend zipformer/paraformer for dual mode"
  - "Alternative virtual devices (Loopback, SoundFlower) need manual --system-device specification"
  - "48kHz→16kHz resampling quality depends on CoreAudio HAL implementation"

pending_input: null

implementation:
  files_modified:
    - "scripts/live-subtitle.py — added device param to all backends, split display, dual transcriber, CLI args"
    - "scripts/start.sh — added --source, --system-device params"
  verification:
    - "Python syntax: ast.parse OK"
    - "Bash syntax: bash -n OK"
    - "Device detection: BlackHole auto-found at index 1"
    - "Argparse: --source, --system-device parsed correctly"
    - "Error handling: missing device shows clear message with device list"
    - "Heavy model warning: dual + whisper shows memory warning"
